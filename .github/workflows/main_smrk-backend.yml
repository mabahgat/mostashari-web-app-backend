# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - smrk-backend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install backend dependencies
        run: npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build (UI + TypeScript)
        run: npm run build:all

      - name: Run tests
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            node_modules/
            ui/dist/
            package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6973A6E318B8487D987BDD96C6CAB504 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_63AC3E2E69E542C7877D1861CBDB1200 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D12DB3E28AEB4515BDAA90A82C9A6117 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smrk-backend'
          slot-name: 'Production'
          package: .

      - name: 'Configure App Settings'
        uses: azure/appservice-settings@v1
        with:
          app-name: 'smrk-backend'
          app-settings-json: |
            [
              { "name": "PORT",                      "value": "8080" },
              { "name": "NODE_ENV",                  "value": "production" },
              { "name": "APP_MODE",                  "value": "dev" },
              { "name": "BACKEND_API_KEY",            "value": "${{ secrets.BACKEND_API_KEY }}" },
              { "name": "AZURE_TENANT_ID",            "value": "${{ vars.AZURE_TENANT_ID }}" },
              { "name": "AZURE_CLIENT_ID",            "value": "${{ vars.AZURE_CLIENT_ID }}" },
              { "name": "AZURE_CLIENT_SECRET",        "value": "${{ secrets.AZURE_CLIENT_SECRET }}" },
              { "name": "AZURE_PROJECT_ENDPOINT",     "value": "${{ vars.AZURE_PROJECT_ENDPOINT }}" },
              { "name": "AZURE_PROJECT_NAME",         "value": "${{ vars.AZURE_PROJECT_NAME }}" },
              { "name": "AZURE_DEPLOYMENT",           "value": "${{ vars.AZURE_DEPLOYMENT }}" },
              { "name": "AZURE_AGENT_NAME",           "value": "${{ vars.AZURE_AGENT_NAME }}" },
              { "name": "SYSTEM_PROMPT",              "value": "${{ secrets.SYSTEM_PROMPT }}" },
              { "name": "CORS_ORIGIN",                "value": "${{ vars.CORS_ORIGIN }}" },
              { "name": "RATE_LIMIT_WINDOW",          "value": "${{ vars.RATE_LIMIT_WINDOW }}" },
              { "name": "RATE_LIMIT_MAX",             "value": "${{ vars.RATE_LIMIT_MAX }}" },
              { "name": "REG_SEARCH_SERVICE",         "value": "${{ vars.REG_SEARCH_SERVICE }}" },
              { "name": "REG_SEARCH_KEY",             "value": "${{ secrets.REG_SEARCH_KEY }}" },
              { "name": "REG_SEARCH_INDEX",           "value": "${{ vars.REG_SEARCH_INDEX }}" },
              { "name": "REG_SEMANTIC_CONFIG",        "value": "${{ vars.REG_SEMANTIC_CONFIG }}" },
              { "name": "CASES_SEARCH_SERVICE",       "value": "${{ vars.CASES_SEARCH_SERVICE }}" },
              { "name": "CASES_SEARCH_KEY",           "value": "${{ secrets.CASES_SEARCH_KEY }}" },
              { "name": "CASES_SEARCH_INDEX",         "value": "${{ vars.CASES_SEARCH_INDEX }}" },
              { "name": "CASES_SEMANTIC_CONFIG",      "value": "${{ vars.CASES_SEMANTIC_CONFIG }}" }
            ]
          